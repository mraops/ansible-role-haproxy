---
# defaults file for haproxy
haproxy_add_official_haproxy_repository: false
haproxy_debian_version: "3.2" # Stable version of HAProxy LTS
haproxy_oom_score_adjust: -900
haproxy_restart_sec: 5s
haproxy_stats_user: haproxy
haproxy_stats_user_pass: haproxy
haproxy_maps_dir: "/etc/haproxy/maps/"

haproxy_maxconn: 4096
haproxy_retries: 3
haproxy_timeout_connect: 5s
haproxy_timeout_client: 50s
haproxy_timeout_server: 50s
haproxy_timeout_queue: 30s
haproxy_timeout_tunnel: 30m

haproxy_frontends:
  []
